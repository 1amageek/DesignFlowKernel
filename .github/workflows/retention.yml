name: DesignFlow retention CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retention-contract:
    runs-on: macos-26
    steps:
      - name: Check out DesignFlowKernel
        uses: actions/checkout@v4

      - name: Build DesignFlowKernel
        shell: bash
        run: |
          set -euo pipefail
          perl -e 'alarm shift; exec @ARGV' 240 \
            xcodebuild build \
              -scheme DesignFlowKernel \
              -destination 'platform=macOS' \
              CODE_SIGNING_ALLOWED=NO

      - name: Run retention regressions
        shell: bash
        run: |
          set -euo pipefail
          result_bundle="${RUNNER_TEMP}/DesignFlowKernel-retention.xcresult"
          perl -e 'alarm shift; exec @ARGV' 240 \
            xcodebuild test \
              -scheme DesignFlowKernel \
              -destination 'platform=macOS' \
              -only-testing:DesignFlowKernelTests/FlowRunReleaseRetentionIndexTests \
              -resultBundlePath "$result_bundle" \
              CODE_SIGNING_ALLOWED=NO

      - name: Upload retention test result
        uses: actions/upload-artifact@v4
        with:
          name: design-flow-kernel-retention-${{ github.run_id }}
          path: ${{ runner.temp }}/DesignFlowKernel-retention.xcresult
          if-no-files-found: error
          retention-days: 90
